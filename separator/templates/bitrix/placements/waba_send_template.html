{% load i18n %}
{% get_current_language as LANGUAGE_CODE %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE|default:'en' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "WABA Template Sender" %}</title>
    <script src="//api.bitrix24.com/api/v1/"></script>
    {{ sender_phones|json_script:"sender-phones-data" }}
    {{ templates_data_by_phone|json_script:"templates-data-by-phone" }}
    {{ recipient_phones|json_script:"recipient-phones-data" }}
    <style>
        body { font-family: Arial, sans-serif; margin: 12px; }
        .row { margin-bottom: 10px; }
        label { display: block; margin-bottom: 4px; font-size: 13px; }
        select, textarea, button { width: 100%; box-sizing: border-box; }
        textarea { min-height: 72px; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        #status { margin-bottom: 10px; font-size: 13px; white-space: pre-wrap; }
    </style>
</head>
<body>
<div id="status"></div>

<form id="sendForm" enctype="multipart/form-data">
    <div class="row">
        <label for="senderPhone">{% trans "Sender number" %}</label>
        <select id="senderPhone" name="sender_phone_id"></select>
    </div>
    <div class="row">
        <label for="template">{% trans "Template" %}</label>
        <select id="template" name="template_id"></select>
    </div>
    <div class="row">
        <label for="recipientPhone">{% trans "Recipient phone" %}</label>
        <select id="recipientPhone" name="phone"></select>
    </div>
    <div id="template-params"></div>
    <input type="hidden" name="entity_id" value="{{ entity_id }}">
    <input type="hidden" name="entity_type_code" value="{{ entity_type_code }}">
</form>
<div class="actions">
    <button id="sendBtn" type="button">{% trans "Send" %}</button>
    <button id="closeBtn" type="button">{% trans "Close" %}</button>
</div>

<script>
(function () {
    const senderPhones = JSON.parse(document.getElementById('sender-phones-data').textContent || '[]');
    const templatesByPhone = JSON.parse(document.getElementById('templates-data-by-phone').textContent || '{}');
    const recipientPhones = JSON.parse(document.getElementById('recipient-phones-data').textContent || '[]');

    const authId = "{{ auth_id|escapejs }}";
    const refreshId = "{{ refresh_id|escapejs }}";
    const memberId = "{{ member_id|escapejs }}";
    const initialSenderId = "{{ initial_sender_phone_id|escapejs }}";

    const statusNode = document.getElementById('status');
    const senderNode = document.getElementById('senderPhone');
    const templateNode = document.getElementById('template');
    const recipientNode = document.getElementById('recipientPhone');
    const paramsContainer = document.getElementById('template-params');
    const formNode = document.getElementById('sendForm');
    const sendBtn = document.getElementById('sendBtn');
    const closeBtn = document.getElementById('closeBtn');

    function hasBX24() {
        return !!(window.BX24 && BX24.placement && BX24.placement.call);
    }
    const i18n = {
        selectAndSend: "{% trans 'Select values and click Send.' %}",
        senderNumber: "{% trans 'Sender number' %}",
        template: "{% trans 'Template' %}",
        recipientPhone: "{% trans 'Recipient phone' %}",
        send: "{% trans 'Send' %}",
        close: "{% trans 'Close' %}",
        failedLoadTemplates: "{% trans 'Failed to load templates' %}",
        sending: "{% trans 'Sending...' %}",
        sendFailed: "{% trans 'Send failed' %}",
        messageSent: "{% trans 'Message sent' %}",
        error: "{% trans 'Error' %}"
    };

    const state = {
        senderPhoneId: '',
        templateId: '',
        recipientPhone: '',
        params: {},
    };

    function setStatus(text, color) {
        statusNode.textContent = text || '';
        statusNode.style.color = color || '#333';
        if (!hasBX24()) {
            return;
        }
        try {
            BX24.placement.call('setLayoutItemState', {
                id: 'info',
                visible: true,
                properties: {
                    value: text || '',
                    color: color === '#b00020' ? 'danger' : (color === '#1b7f3a' ? 'success' : 'base_70'),
                    multiline: true,
                }
            });
        } catch (e) {
            // ignore
        }
    }

    function valuesMapFromNode(node) {
        const values = {};
        Array.from(node.options || []).forEach((option) => {
            values[option.value] = option.textContent;
        });
        return values;
    }

    function recipientValuesMap() {
        const values = {};
        recipientPhones.forEach((item) => {
            values[item.value] = item.label;
        });
        return values;
    }

    function ensureHiddenInput(name) {
        let input = formNode.querySelector('input[name="' + name + '"]');
        if (!input) {
            input = document.createElement('input');
            input.type = 'hidden';
            input.name = name;
            formNode.appendChild(input);
        }
        return input;
    }

    function setParamValue(name, value) {
        state.params[name] = value || '';
        const input = ensureHiddenInput(name);
        input.value = value || '';
    }

    function syncDomFromState() {
        senderNode.value = state.senderPhoneId || '';
        templateNode.value = state.templateId || '';
        recipientNode.value = state.recipientPhone || '';
        Object.keys(state.params || {}).forEach((key) => {
            setParamValue(key, state.params[key]);
        });
    }

    function fillSenders() {
        senderNode.innerHTML = '';
        senderPhones.forEach((item) => {
            const option = document.createElement('option');
            option.value = item.id;
            option.textContent = item.label;
            senderNode.appendChild(option);
        });
        if (initialSenderId) {
            senderNode.value = initialSenderId;
        }
        state.senderPhoneId = senderNode.value || '';
    }

    function fillTemplates(list) {
        templateNode.innerHTML = '';
        (list || []).forEach((item) => {
            const option = document.createElement('option');
            option.value = item.id;
            option.textContent = item.label;
            templateNode.appendChild(option);
        });
        state.templateId = templateNode.value || '';
    }

    function fillRecipients() {
        recipientNode.innerHTML = '';
        recipientPhones.forEach((item) => {
            const option = document.createElement('option');
            option.value = item.value;
            option.textContent = item.label;
            recipientNode.appendChild(option);
        });
        state.recipientPhone = recipientNode.value || '';
    }

    function labelForComponent(comp) {
        let label = comp.type || "COMPONENT";
        if (comp.format) {
            label = label + " " + comp.format;
        }
        return label;
    }

    function addInput(label, name, type, accept) {
        const wrap = document.createElement("div");
        wrap.className = "row";

        const lab = document.createElement("label");
        lab.setAttribute("for", name);
        lab.textContent = label;
        wrap.appendChild(lab);

        let input;
        if (type === "textarea") {
            input = document.createElement("textarea");
            input.rows = 2;
        } else {
            input = document.createElement("input");
            input.type = type || "text";
        }
        input.id = name;
        input.name = name;
        input.required = true;
        if (accept) {
            input.setAttribute("accept", accept);
        }
        input.addEventListener('input', function () {
            setParamValue(name, input.value || '');
        });
        wrap.appendChild(input);
        paramsContainer.appendChild(wrap);
        return input;
    }

    function collectTemplateFields(templateId) {
        const phoneId = senderNode.value;
        const list = templatesByPhone[phoneId] || [];
        const tpl = list.find((item) => String(item.id) === String(templateId));
        if (!tpl) {
            return [];
        }
        const fields = [];
        (tpl.components || []).forEach((comp) => {
            const named = comp.named_params || [];
            const positional = comp.positional_params || [];
            const hasMedia = comp.type === "HEADER" && ["IMAGE", "VIDEO", "DOCUMENT", "GIF"].includes(comp.format);
            const hasLocation = comp.type === "HEADER" && comp.format === "LOCATION";
            let hasButtonParams = false;
            if (comp.type === "BUTTONS") {
                (comp.buttons || []).forEach((btn) => {
                    if ((btn.named_params || []).length || (btn.positional_params || []).length) {
                        hasButtonParams = true;
                    }
                });
            }

            const hasInputs = named.length || positional.length || hasMedia || hasLocation || hasButtonParams;
            if (!hasInputs) {
                return;
            }
            fields.push({
                id: `title__${comp.id}`,
                label: labelForComponent(comp),
                type: "title",
            });

            if (comp.type !== "BUTTONS") {
                named.forEach((p) => {
                    fields.push({
                        id: `param__${comp.id}__named__${p.name}`,
                        label: p.name,
                        type: "text",
                        required: true,
                    });
                });

                positional.forEach((p) => {
                    fields.push({
                        id: `param__${comp.id}__pos__${p.position}`,
                        label: "Param " + p.position,
                        type: "text",
                        required: true,
                    });
                });
            }

            if (hasMedia) {
                fields.push({
                    id: `media__${comp.id}`,
                    label: "Media URL",
                    type: "text",
                    required: true,
                });
            }

            if (hasLocation) {
                fields.push({
                    id: `location__${comp.id}__latitude`,
                    label: "Latitude",
                    type: "text",
                    required: true,
                });
                fields.push({
                    id: `location__${comp.id}__longitude`,
                    label: "Longitude",
                    type: "text",
                    required: true,
                });
                fields.push({
                    id: `location__${comp.id}__name`,
                    label: "Name",
                    type: "text",
                    required: true,
                });
                fields.push({
                    id: `location__${comp.id}__address`,
                    label: "Address",
                    type: "text",
                    required: true,
                });
            }

            if (comp.type === "BUTTONS") {
                (comp.buttons || []).forEach((btn) => {
                    (btn.named_params || []).forEach((p) => {
                        fields.push({
                            id: `param__btn__${btn.id}__named__${p.name}`,
                            label: `Button ${btn.index + 1} ${btn.type} ${p.name}`,
                            type: "text",
                            required: true,
                        });
                    });
                    (btn.positional_params || []).forEach((p) => {
                        fields.push({
                            id: `param__btn__${btn.id}__pos__${p.position}`,
                            label: `Button ${btn.index + 1} ${btn.type} Param ${p.position}`,
                            type: "text",
                            required: true,
                        });
                    });
                });
            }
        });
        return fields;
    }

    let currentFields = [];

    function renderTemplateFields(templateId) {
        paramsContainer.innerHTML = "";
        const fields = collectTemplateFields(templateId);
        fields.forEach((field) => {
            if (field.type === "title") {
                const title = document.createElement("div");
                title.className = "row";
                title.innerHTML = "<strong>" + field.label + "</strong>";
                paramsContainer.appendChild(title);
                return;
            }
            const input = addInput(field.label, field.id, field.type, field.accept);
            if (field.required && input) {
                input.required = true;
            }
        });
        currentFields = fields;
        return fields;
    }

    let builtInInputType = 'input';

    function renderBuiltInLayout(fields) {
        if (!hasBX24()) {
            return;
        }
        const blocks = {
            info: {
                type: 'text',
                properties: {
                    value: i18n.selectAndSend,
                    color: 'base_70',
                },
            },
            senderSelect: {
                type: 'select',
                properties: {
                    title: i18n.senderNumber,
                    selectedValue: state.senderPhoneId,
                    values: valuesMapFromNode(senderNode),
                },
            },
            templateSelect: {
                type: 'select',
                properties: {
                    title: i18n.template,
                    selectedValue: state.templateId,
                    values: valuesMapFromNode(templateNode),
                },
            },
            recipientSelect: {
                type: 'select',
                properties: {
                    title: i18n.recipientPhone,
                    selectedValue: state.recipientPhone,
                    values: recipientValuesMap(),
                },
            },
        };

        (fields || []).forEach((field) => {
            if (field.type === 'title') {
                blocks[field.id] = {
                    type: 'text',
                    properties: {
                        value: field.label,
                        color: 'base_70',
                    },
                };
                return;
            }
            if (field.type === 'file') {
                blocks[field.id] = {
                    type: 'file',
                    properties: {
                        title: field.label,
                    },
                };
                return;
            }
            blocks[field.id] = {
                type: builtInInputType,
                properties: {
                    title: field.label,
                    value: state.params[field.id] || '',
                },
            };
        });

        BX24.placement.call('setLayout', {
            blocks: blocks,
            primaryButton: { title: i18n.send },
            secondaryButton: { title: i18n.close },
        });
    }

    function loadTemplatesBySender(senderId) {
        if (!senderId) {
            fillTemplates([]);
            const fields = renderTemplateFields('');
            renderBuiltInLayout(fields);
            return Promise.resolve();
        }
        const cached = templatesByPhone[senderId];
        if (cached && cached.length) {
            fillTemplates(cached);
            const fields = renderTemplateFields(templateNode.value);
            renderBuiltInLayout(fields);
            return Promise.resolve();
        }
        const payload = new URLSearchParams();
        payload.append('action', 'get_templates');
        payload.append('AUTH_ID', authId);
        payload.append('REFRESH_ID', refreshId);
        payload.append('member_id', memberId);
        payload.append('sender_phone_id', senderId);

        return fetch(window.location.pathname + window.location.search, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
            body: payload.toString(),
            credentials: 'same-origin',
        })
        .then((response) => response.json())
        .then((result) => {
            if (!result.ok) {
                throw new Error(result.error || i18n.failedLoadTemplates);
            }
            fillTemplates(result.templates || []);
            state.templateId = templateNode.value || '';
            const fields = renderTemplateFields(templateNode.value);
            renderBuiltInLayout(fields);
        });
    }

    function validateTemplateParams(fields) {
        const list = fields || [];
        for (let i = 0; i < list.length; i += 1) {
            const field = list[i];
            if (!field.required) {
                continue;
            }
            const value = state.params[field.id];
            if (!value || !String(value).trim()) {
                return field.label || i18n.error;
            }
        }
        return null;
    }

    function sendTemplate() {
        const fields = currentFields || [];
        const errorText = validateTemplateParams(fields);
        if (errorText) {
            setStatus(errorText, '#b00020');
            return;
        }
        syncDomFromState();
        const payload = new FormData(formNode);
        payload.append('action', 'send');
        payload.append('AUTH_ID', authId);
        payload.append('REFRESH_ID', refreshId);
        payload.append('member_id', memberId);
        if (hasBX24() && typeof BX24.getAuth === 'function') {
            try {
                const auth = BX24.getAuth();
                if (auth && auth.user_id) {
                    payload.append('bitrix_user_id', auth.user_id);
                }
            } catch (e) {
                // ignore
            }
        }

        sendBtn.disabled = true;
        setStatus(i18n.sending, '#8a6d00');

        fetch(window.location.pathname + window.location.search, {
            method: 'POST',
            body: payload,
            credentials: 'same-origin',
        })
        .then((response) => response.json())
        .then((result) => {
            if (!result.ok) {
                throw new Error(result.error || i18n.sendFailed);
            }
            setStatus(i18n.messageSent, '#1b7f3a');
        })
        .catch((error) => {
            setStatus(error.message || i18n.error, '#b00020');
        })
        .finally(() => {
            sendBtn.disabled = false;
        });
    }

    fillSenders();
    loadTemplatesBySender(senderNode.value).catch((error) => setStatus(error.message, '#b00020'));
    fillRecipients();
    syncDomFromState();

    senderNode.addEventListener('change', function () {
        state.senderPhoneId = senderNode.value || '';
        loadTemplatesBySender(senderNode.value).catch((error) => setStatus(error.message, '#b00020'));
    });

    templateNode.addEventListener('change', function () {
        state.templateId = templateNode.value || '';
        const fields = renderTemplateFields(templateNode.value);
        renderBuiltInLayout(fields);
    });

    recipientNode.addEventListener('change', function () {
        state.recipientPhone = recipientNode.value || '';
    });

    sendBtn.addEventListener('click', sendTemplate);
    closeBtn.addEventListener('click', function () {
        if (hasBX24()) {
            BX24.placement.call('finish');
            return;
        }
        window.close();
    });

    function initBitrixUi() {
        if (!hasBX24() || typeof BX24.init !== 'function') {
            return false;
        }
        BX24.init(function () {
            const fields = renderTemplateFields(templateNode.value);
            renderBuiltInLayout(fields);

            BX24.placement.call('bindSecondaryButtonClickCallback', null, function () {
                BX24.placement.call('finish');
            });
            BX24.placement.call('bindPrimaryButtonClickCallback', null, function () {
                syncDomFromState();
                sendTemplate();
            });
            BX24.placement.call('bindValueChangeCallback', null, function (eventData) {
                if (!eventData || !eventData.id) {
                    return;
                }
                if (eventData.id === 'senderSelect') {
                    state.senderPhoneId = eventData.value || '';
                    syncDomFromState();
                    loadTemplatesBySender(state.senderPhoneId).catch((error) => setStatus(error.message, '#b00020'));
                    return;
                }
                if (eventData.id === 'templateSelect') {
                    state.templateId = eventData.value || '';
                    syncDomFromState();
                    const newFields = renderTemplateFields(state.templateId);
                    renderBuiltInLayout(newFields);
                    return;
                }
                if (eventData.id === 'recipientSelect') {
                    state.recipientPhone = eventData.value || '';
                    syncDomFromState();
                    return;
                }
                if (eventData.id.indexOf('param__') === 0 || eventData.id.indexOf('location__') === 0 || eventData.id.indexOf('media__') === 0) {
                    setParamValue(eventData.id, eventData.value || '');
                    syncDomFromState();
                }
            });
        });
        return true;
    }

    function waitForBX24(attemptsLeft) {
        if (initBitrixUi()) {
            return;
        }
        if (attemptsLeft <= 0) {
            return;
        }
        setTimeout(function () {
            waitForBX24(attemptsLeft - 1);
        }, 250);
    }

    waitForBX24(20);
})();
</script>
</body>
</html>
